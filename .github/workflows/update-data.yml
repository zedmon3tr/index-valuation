name: Update valuation data

on:
  schedule:
    # 每天 10:00 UTC（约北京时间 18:00，收盘后）自动运行
    - cron: "0 10 * * *"
  workflow_dispatch: {}        # 允许在 Actions 页面手动点击运行

permissions:
  contents: write              # 允许把生成的 data/ 提交回仓库

# 定时与手动触发、或运行期间 main 有新提交时，串行执行避免 push 撞车（非快进被拒）。
concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install akshare

      - name: Build valuation JSON
        run: python scripts/build_data.py

      - name: Fetch fund NAV snapshot
        run: python scripts/fetch_fund_nav.py   # 纯 stdlib，无需额外依赖

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data
          if git diff --quiet --staged; then
            echo "数据无变化，无需提交。"
          else
            git commit -m "chore: 更新指数估值与基金净值数据"
            # main 可能在本次运行期间已有新提交，先 rebase 再 push，避免非快进被拒。
            git pull --rebase origin main
            git push
          fi
